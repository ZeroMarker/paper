      We introduce our first-generation reasoning models, DeepSeek-R1-Zero and DeepSeek-R1. DeepSeek-R1-Zero, a
      model trained via large-scale reinforcement learning (RL) without supervised fine-tuning (SFT) as a preliminary step,
      demonstrates remarkable reasoning capabilities. Through RL, DeepSeek-R1-Zero naturally emerges with numerous powerful
      and intriguing reasoning behaviors. However, it encounters challenges such as poor readability, and language mixing. To
