deep_learning:
  - key: 2GXSXUJB
    item_type: preprint
    publication_year: 2015
    author: "He, Kaiming; Zhang, Xiangyu; Ren, Shaoqing; Sun, Jian"
    title: "Deep Residual Learning for Image Recognition"
    doi: "10.48550/arXiv.1512.03385"
    url: "http://arxiv.org/abs/1512.03385"
    abstract_note: >-
      Deeper neural networks are more difficult to train. We present a residual learning framework to ease the
      training of networks that are substantially deeper than those used previously. We explicitly reformulate the layers as
      learning residual functions with reference to the layer inputs, instead of learning unreferenced functions. We provide
      comprehensive empirical evidence showing that these residual networks are easier to optimize, and can gain accuracy from
      considerably increased depth. On the ImageNet dataset we evaluate residual nets with a depth of up to 152 layers---8x
      deeper than VGG nets but still having lower complexity. An ensemble of these residual nets achieves 3.57% error on the
      ImageNet test set. This result won the 1st place on the ILSVRC 2015 classification task. We also present analysis on CIFAR-10
      with 100 and 1000 layers. The depth of representations is of central importance for many visual recognition tasks. Solely
      due to our extremely deep representations, we obtain a 28% relative improvement on the COCO object detection dataset.
      Deep residual nets are foundations of our submissions to ILSVRC & COCO 2015 competitions, where we also won the 1st places
      on the tasks of ImageNet detection, ImageNet localization, COCO detection, and COCO segmentation.
    date: "2015-12-10"
    publisher: arXiv
    automatic_tags: "Computer Science - Computer Vision and Pattern Recognition"
    file_attachments: >-
      C:\Users\ttft3\Zotero\storage\UD9K62Q6\He 等 - 2015 - Deep Residual Learning for Image Recognition.pdf;
      C:\Users\ttft3\Zotero\storage\8J92S53K\1512.html

  - key: CCZTPISQ
    item_type: preprint
    publication_year: 2016
    author: "Redmon, Joseph; Divvala, Santosh; Girshick, Ross; Farhadi, Ali"
    title: "You Only Look Once: Unified, Real-Time Object Detection"
    doi: "10.48550/arXiv.1506.02640"
    url: "http://arxiv.org/abs/1506.02640"
    abstract_note: >-
      We present YOLO, a new approach to object detection. Prior work on object detection repurposes classifiers
      to perform detection. Instead, we frame object detection as a regression problem to spatially separated bounding boxes
      and associated class probabilities. A single neural network predicts bounding boxes and class probabilities directly from
      full images in one evaluation. Since the whole detection pipeline is a single network, it can be optimized end-to-end
      directly on detection performance. Our unified architecture is extremely fast. Our base YOLO model processes images in
      real-time at 45 frames per second. A smaller version of the network, Fast YOLO, processes an astounding 155 frames per
      second while still achieving double the mAP of other real-time detectors. Compared to state-of-the-art detection systems,
      YOLO makes more localization errors but is far less likely to predict false detections where nothing exists. Finally,
      YOLO learns very general representations of objects. It outperforms all other detection methods, including DPM and R-CNN,
      by a wide margin when generalizing from natural images to artwork on both the Picasso Dataset and the People-Art Dataset.
    date: "2016-05-09"
    short_title: "You Only Look Once"
    publisher: arXiv
    automatic_tags: "Computer Science - Computer Vision and Pattern Recognition"
